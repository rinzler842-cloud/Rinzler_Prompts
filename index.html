<!DOCTYPE html>

    <title>Therapy Prompts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
            background: #121212;
            color: #e0e0e0;
        }

        h1 {
            margin-bottom: 20px;
        }

        #prompt {
            font-size: 20px;
            margin: 30px auto;
            max-width: 700px;
            padding: 25px;
            background: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            min-height: 80px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 15px;
            cursor: pointer;
            border-radius: 6px;
            border: none;
        }

        .primary { background-color: #3a7bfd; color: white; }
        .success { background-color: #2e7d32; color: white; }
        .danger { background-color: #aa2e25; color: white; }

        #moodSelector {
            margin-top: 20px;
        }

        .mood-option {
            margin: 8px;
            display: inline-block;
        }

        input[type="radio"] {
            margin-right: 6px;
            transform: scale(1.2);
        }

        #dashboard {
            margin-top: 40px;
            text-align: left;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
        }

        .completed-item {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }

        /* Mood background colors */
        .mood-1 { background-color: rgba(170, 46, 37, 0.25); }
        .mood-2 { background-color: rgba(90, 110, 130, 0.25); }
        .mood-3 { background-color: rgba(46, 125, 50, 0.25); }

        /* Mood counter text colors */
        .counter-1 { color: rgb(170, 46, 37); }
        .counter-2 { color: rgb(90, 110, 130); }
        .counter-3 { color: rgb(46, 125, 50); }

    </style>
</head>

<h1>🖤 Therapy Prompts</h1>

<div id="prompt">Click "Draw Prompt" to begin.</div>

<button class="primary" onclick="drawPrompt()">Draw Prompt</button>

<div id="moodSelector" style="display:none;">
    <div>
        <label class="mood-option">
            <input type="radio" name="mood" value="1">
            Crashing out
        </label>

        <label class="mood-option">
            <input type="radio" name="mood" value="2">
            Average day
        </label>

        <label class="mood-option">
            <input type="radio" name="mood" value="3">
            Like a thousand bucks
        </label>
    </div>

    <button class="success" onclick="confirmComplete()">Mark As Completed</button>
</div>

<button class="danger" onclick="resetAll()">Reset All</button>

<div id="dashboard">
    <h3>📊 Stats Dashboard</h3>
    <div id="statsNumbers"></div>
    <h4>Completed Prompts:</h4>
    <div id="completedList"></div>
</div>

let currentPrompt = null;

function loadData() {
    let remaining = localStorage.getItem("remainingPrompts");
    let completed = localStorage.getItem("completedPrompts");

    if (!remaining || !completed) {
        localStorage.setItem("remainingPrompts", JSON.stringify(originalPrompts));
        localStorage.setItem("completedPrompts", JSON.stringify([]));
        return {
            remaining: [...originalPrompts],
            completed: []
        };
    }

    return {
        remaining: JSON.parse(remaining),
        completed: JSON.parse(completed)
    };
}

function saveData(remaining, completed) {
    localStorage.setItem("remainingPrompts", JSON.stringify(remaining));
    localStorage.setItem("completedPrompts", JSON.stringify(completed));
}

function drawPrompt() {
    let data = loadData();
    if (data.remaining.length === 0) {
        document.getElementById("prompt").innerText = "You've completed all prompts! 🎉";
        return;
    }

    let index = Math.floor(Math.random() * data.remaining.length);
    currentPrompt = data.remaining[index];
    document.getElementById("prompt").innerText = currentPrompt;

    document.getElementById("moodSelector").style.display = "block";
}

function confirmComplete() {
    if (!currentPrompt) return;

    let selectedMood = document.querySelector('input[name="mood"]:checked');
    if (!selectedMood) {
        alert("Please select a mood.");
        return;
    }

    let moodValue = parseInt(selectedMood.value);
    let data = loadData();

    data.remaining = data.remaining.filter(p => p !== currentPrompt);
    data.completed.push({
        text: currentPrompt,
        mood: moodValue
    });

    saveData(data.remaining, data.completed);

    currentPrompt = null;
    document.getElementById("prompt").innerText = "Prompt marked as completed.";
    document.getElementById("moodSelector").style.display = "none";
    document.querySelectorAll('input[name="mood"]').forEach(r => r.checked = false);

    updateDashboard();
}

function updateDashboard() {
    let data = loadData();
    let moodCounts = [0,0,0];

    data.completed.forEach(entry => {
        moodCounts[entry.mood - 1]++;
    });

    document.getElementById("statsNumbers").innerHTML = `
        Total: ${originalPrompts.length} <br>
        Remaining: ${data.remaining.length} <br>
        Completed: ${data.completed.length} <br><br>
        Mood Breakdown:<br>
        <span class="counter-1">Crashing out: ${moodCounts[0]}</span><br>
        <span class="counter-2">Average day: ${moodCounts[1]}</span><br>
        <span class="counter-3">Like a thousand bucks: ${moodCounts[2]}</span>
    `;

    let list = document.getElementById("completedList");
    list.innerHTML = "";

    data.completed.forEach(entry => {
        let div = document.createElement("div");
        div.className = "completed-item mood-" + entry.mood;
        div.innerText = entry.text;
        list.appendChild(div);
    });
}

function resetAll() {
    if (!confirm("Reset everything?")) return;

    localStorage.setItem("remainingPrompts", JSON.stringify(originalPrompts));
    localStorage.setItem("completedPrompts", JSON.stringify([]));
    currentPrompt = null;
    document.getElementById("prompt").innerText = "All prompts reset.";
    document.getElementById("moodSelector").style.display = "none";

    updateDashboard();
}

updateDashboard();
